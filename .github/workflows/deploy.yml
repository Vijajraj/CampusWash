name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Render deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
